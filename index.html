<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Interactive Story</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <a href="dashboard.html" class="dashboard-link" title="View Dashboard">📊 Dashboard</a>
  
  <div class="video-container">
    <video id="mainVideo" autoplay muted playsinline>
      <source src="Videos/vid1.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>

    <!-- Choice overlay -->
    <div class="overlay" id="choiceOverlay">
      <div class="choices">
        <button class="btn" data-video="Videos/vid2.mp4">Option A</button>
        <button class="btn" data-video="Videos/vid3.mp4">Option B</button>
      </div>
    </div>

    <!-- End screen overlay -->
    <div class="overlay" id="endOverlay">
      <div class="end-card" id="endCard"></div>

      <!-- Review modal -->
      <div class="modal" id="reviewModal" aria-hidden="true">
        <div class="modal-card" role="dialog" aria-modal="true">
          <h4>Review</h4>
          <p id="reviewText"></p>
          <div class="modal-actions">
            <button class="btn-close" id="closeReviewBtn">Close</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Reflection Form Overlay -->
    <div class="overlay" id="reflectionOverlay">
      <div class="reflection-form-container">
        <h2>Reflection Dashboard</h2>
        <p class="form-subtitle">Share your thoughts about this experience</p>
        <form id="reflectionForm">
          <div class="form-group">
            <label for="studentName">Your Name</label>
            <input type="text" id="studentName" name="studentName" required placeholder="Enter your name">
          </div>

          <div class="form-group">
            <label for="mainTakeaway">What was your main takeaway from this story?</label>
            <textarea id="mainTakeaway" name="mainTakeaway" rows="4" required placeholder="Share your thoughts..."></textarea>
          </div>

          <div class="form-group">
            <label for="emotionalResponse">How did this story make you feel?</label>
            <select id="emotionalResponse" name="emotionalResponse" required>
              <option value="">Select an emotion...</option>
              <option value="inspired">Inspired</option>
              <option value="thoughtful">Thoughtful</option>
              <option value="empowered">Empowered</option>
              <option value="curious">Curious</option>
              <option value="concerned">Concerned</option>
              <option value="other">Other</option>
            </select>
          </div>

          <div class="form-group">
            <label for="confidence">Rate your confidence level (1-10)</label>
            <input type="range" id="confidence" name="confidence" min="1" max="10" value="5">
            <span class="range-value" id="confidenceValue">5</span>
          </div>

          <div class="form-group">
            <label for="additionalComments">Additional Comments (Optional)</label>
            <textarea id="additionalComments" name="additionalComments" rows="3" placeholder="Any other thoughts you'd like to share..."></textarea>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn btn-submit">Submit Reflection</button>
            <button type="button" class="btn btn-secondary" id="closeReflectionBtn">Close</button>
          </div>
        </form>

        <!-- Success Message -->
        <div class="success-message" id="successMessage">
          <h3>✓ Thank you!</h3>
          <p>Your reflection has been submitted successfully.</p>
          <button class="btn" id="closeSuccessBtn">Close</button>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
